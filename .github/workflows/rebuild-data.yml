name: Rebuild mNAV dataset

on:
  schedule:
    - cron: "15 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild-data:
    runs-on: ubuntu-latest
    env:
      SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh holdings history
        run: npm run data:holdings

      - name: Refresh share history
        run: npm run data:shares

      - name: Rebuild dataset
        run: npm run data:build

      - name: Validate dataset
        run: npm run data:validate

      - name: Detect dataset changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain -- data/raw/mstr-holdings-history.json data/raw/mstr-shares-history.json data/processed/mstr-mnav.json)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated dataset
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/mstr-holdings-history.json data/raw/mstr-shares-history.json data/processed/mstr-mnav.json
          git commit -m "Refresh market data inputs"

      - name: Push dataset update
        if: steps.changes.outputs.changed == 'true'
        run: git push
